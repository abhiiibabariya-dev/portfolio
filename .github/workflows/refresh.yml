name: Auto-refresh portfolio

# Rebuilds & redeploys the site daily (or on demand) so:
#   - LIVE_FEED shows the latest GitHub activity
#   - GitHub Pages CDN cache is invalidated
# Triggers:
#   - schedule: daily at 03:00 UTC
#   - push: any commit to main (already deploys via Pages)
#   - workflow_dispatch: manual trigger from Actions tab
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update sync timestamp
        run: |
          echo "Portfolio auto-refresh: $(date -u +'%Y-%m-%d %H:%M UTC')" > .last-sync
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .last-sync
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: auto-refresh $(date -u +'%Y-%m-%d')"
            git push
          fi
